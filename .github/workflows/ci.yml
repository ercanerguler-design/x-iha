name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── GCS TypeScript check ─────────────────────────────────────────────────
  typecheck-gcs:
    name: Typecheck GCS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: gcs/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: gcs

      - name: Typecheck
        run: npm run typecheck
        working-directory: gcs

  # ── GCS build (Vite only, no Electron packaging) ────────────────────────
  build-gcs:
    name: Build GCS (Vite)
    runs-on: ubuntu-latest
    needs: typecheck-gcs
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: gcs/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: gcs

      - name: Build (no packaging)
        run: npx electron-vite build
        working-directory: gcs

  # ── Web (Next.js) build ──────────────────────────────────────────────────
  build-web:
    name: Build Landing Page
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: x-neu/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: x-neu

      - name: Build
        run: npm run build
        working-directory: x-neu
        env:
          # Next.js SMTP config — secrets not needed for CI build check
          SMTP_USER: ci@xneu.local
          SMTP_PASS: ci_placeholder

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: x-neu/.next/
          retention-days: 7
